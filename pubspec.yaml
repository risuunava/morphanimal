name: morphanimal
description: Morphanimal
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Local Database
  hive_flutter: ^1.1.0

  # AI / ML
  tflite_flutter: ^0.10.4

  # Camera & Image
  camera: ^0.10.5+9
  flutter_image_compress: ^2.2.0
  image: ^4.1.7

  # File System
  path_provider: ^2.1.3
  path: ^1.9.0

  # Permissions
  permission_handler: ^11.3.1
  image_picker: ^1.1.2

  # UI & Animation
  flutter_animate: ^4.5.0
  flutter_svg: ^2.0.9
  lottie: ^3.1.0
  confetti: ^0.7.0
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0
  gap: ^3.0.1

  # Fonts
  google_fonts: ^6.2.1

  # Sharing
  screenshot: ^3.0.0
  share_plus: ^13.2.0

  # Utils
  uuid: ^4.4.0
  crypto: ^3.0.3
  intl: ^0.19.0

  # Backend (stub untuk Phase 4)
  supabase_flutter: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/icons/
    - assets/icons/elements/
    - assets/animations/
    - assets/images/
    - assets/models/
    - assets/models/animal_classifier.tflite
    - assets/models/animal_labels.txt
